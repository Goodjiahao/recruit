spring.application.name=recruit
server.port=8080

# ===== 数据源：本机 MySQL bigdata 库 =====
spring.datasource.url=jdbc:mysql://localhost:3306/bigdata?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== HikariCP 连接池（稳定性）=====
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== 日志 =====
logging.level.com.cauc.recruit=INFO
logging.level.org.springframework.jdbc=WARN
